[settings]
experimental = true
env_cache = true
env_cache_ttl = "9h"
install_before = "7d"
pin = true
lockfile = true
locked = false
prefer_offline = true
disable_default_registry = true
disable_backends = ["asdf", "vfox", "ubi"]

[tools]
"github:mongodb/kingfisher" = "1.98.0"
cocogitto = "7.0.0"
pinact = "3.9.2"
prek = "0.3.9"
syft = "1.42.4"
dotnet = "10.0.203"

[tasks."secret:scan"]
run = "kingfisher scan . --no-validate --redact"
description = "Scan codebase for secrets with Kingfisher"
alias = "ss"

[tasks."secret:validate"]
run = "kingfisher scan . --redact"
description = "Validate (and revoke) live secrets found by Kingfisher"
alias = "sv"

[tasks.bump]
run = "cog bump --auto"
description = "Calculate next version from conventional commits and tag"

[tasks."release:sbom"]
# Per-package SBOM. The release workflow runs after release:pack so
# out/packages/<PackageId>.<version>.nupkg exists; syft scans the
# nupkg directly and writes one CycloneDX document per release.
# RELEASE_PKG_NAME selects the slug for the output filename.
run = """
#!/usr/bin/env bash
set -euo pipefail
: "${RELEASE_PKG_NAME:?RELEASE_PKG_NAME must be set (run release:parse-tag first)}"
mkdir -p out/sbom
nupkg=$(ls out/packages/*.nupkg | head -n1)
syft scan "file:$nupkg" -o "cyclonedx-json=out/sbom/${RELEASE_PKG_NAME}.cdx.json"
"""
description = "Generate per-package CycloneDX SBOM from the produced nupkg"
alias = "rsbom"

[tasks.lint]
description = "Run all linting"
depends = ["lint:*"]

[tasks.build]
run = "dotnet build SdkCoreDotnet.slnx"
description = "Build the .NET solution"
alias = "b"

[tasks.test]
# .NET 10 SDK requires `dotnet test --solution <file>` when the
# test runner is set to Microsoft.Testing.Platform in global.json
# (positional slnx is rejected in MTP mode). Same flag shape used
# by ci:test so the CI and local invocations stay aligned.
run = "dotnet test --solution SdkCoreDotnet.slnx"
description = "Run .NET tests across every test project in the slnx"
alias = "t"

[tasks.restore]
run = "dotnet restore SdkCoreDotnet.slnx"
description = "Restore NuGet packages"
alias = "r"

[tasks.format]
run = "dotnet format SdkCoreDotnet.slnx"
description = "Format code via .editorconfig rules"
alias = "fmt"

[tasks."format:check"]
run = "dotnet format SdkCoreDotnet.slnx --verify-no-changes"
description = "Verify formatting without changes"
alias = "fmtc"

[tasks.pack]
run = "dotnet pack SdkCoreDotnet.slnx --configuration Release --output out/packages"
description = "Build NuGet packages into out/packages"

[tasks."release:parse-tag"]
# Slice a <pkg>-v<semver> tag (e.g. core-v0.4.0) into the four
# variables the release pipeline needs:
#   RELEASE_PKG_NAME    cog package key (core, caching, ...)
#   RELEASE_VERSION     plain semver, no v prefix
#   RELEASE_PROJECT     path to the csproj for `dotnet pack`
#   RELEASE_PROPERTY    MSBuild property name in eng/Versions.props
#
# Run via `mise run release:parse-tag` after exporting RELEASE_TAG.
# The script prints `KEY=value` lines suitable for $GITHUB_ENV.
# Same shape as the Dart variant; only the path mapping differs.
run = """
#!/usr/bin/env bash
set -euo pipefail
tag="${RELEASE_TAG:?RELEASE_TAG must be set to the pushed git tag}"
name="${tag%-v*}"
version="${tag##*-v}"
case "$name" in
  core)        project="src/Pinguteca.Sdk.Core/Pinguteca.Sdk.Core.csproj"
               property="PingutecaSdkCoreVersion" ;;
  caching)     project="src/Pinguteca.Sdk.Core.Caching/Pinguteca.Sdk.Core.Caching.csproj"
               property="PingutecaSdkCoreCachingVersion" ;;
  compression) project="src/Pinguteca.Sdk.Core.Compression/Pinguteca.Sdk.Core.Compression.csproj"
               property="PingutecaSdkCoreCompressionVersion" ;;
  hedge)       project="src/Pinguteca.Sdk.Core.Hedge/Pinguteca.Sdk.Core.Hedge.csproj"
               property="PingutecaSdkCoreHedgeVersion" ;;
  logging)     project="src/Pinguteca.Sdk.Core.Logging/Pinguteca.Sdk.Core.Logging.csproj"
               property="PingutecaSdkCoreLoggingVersion" ;;
  ergo)        project="src/Pinguteca.Sdk.Ergo/Pinguteca.Sdk.Ergo.csproj"
               property="PingutecaSdkErgoVersion" ;;
  oauth)       project="src/Pinguteca.Sdk.Core.OAuth/Pinguteca.Sdk.Core.OAuth.csproj"
               property="PingutecaSdkCoreOAuthVersion" ;;
  *)           echo "Unknown package '$name' from tag '$tag'." >&2; exit 1 ;;
esac
echo "RELEASE_PKG_NAME=$name"
echo "RELEASE_VERSION=$version"
echo "RELEASE_PROJECT=$project"
echo "RELEASE_PROPERTY=$property"
"""
description = "Slice <pkg>-v<semver> tag into RELEASE_* env vars"

[tasks."release:verify-version"]
# Cross-check that eng/Versions.props on the tagged commit names the
# same version as the tag. cog produces the bump commit and tag
# atomically, so divergence means a manual edit drifted from cog's
# state. Fails fast before the NuGet push step.
run = """
#!/usr/bin/env bash
set -euo pipefail
: "${RELEASE_PROPERTY:?RELEASE_PROPERTY must be set (run release:parse-tag first)}"
: "${RELEASE_VERSION:?RELEASE_VERSION must be set (run release:parse-tag first)}"
declared=$(grep -oP "(?<=<${RELEASE_PROPERTY}>)[^<]+" eng/Versions.props || true)
if [ -z "$declared" ]; then
  echo "Property ${RELEASE_PROPERTY} not found in eng/Versions.props." >&2
  exit 1
fi
if [ "$declared" != "$RELEASE_VERSION" ]; then
  echo "Version mismatch: tag wants $RELEASE_VERSION but eng/Versions.props declares $declared for $RELEASE_PROPERTY." >&2
  exit 1
fi
echo "eng/Versions.props matches tag at $RELEASE_VERSION."
"""
description = "Verify eng/Versions.props matches the tag's version"

[tasks."release:pack"]
# Pack a single package. Used by the per-package release workflow
# after release:parse-tag emits RELEASE_PROJECT. `dotnet pack` runs
# offline against the local build output and writes a .nupkg, so it
# doubles as the publish dry run; the network step is the NuGet
# push that consumes the OIDC token.
run = "dotnet pack \"${RELEASE_PROJECT:?RELEASE_PROJECT must be set (run release:parse-tag first)}\" --configuration Release --no-build --output out/packages"
description = "Pack the single project named by RELEASE_PROJECT"
