[settings]
experimental = true
env_cache = true
env_cache_ttl = "9h"
install_before = "7d"
pin = true
lockfile = true
locked = false
prefer_offline = true
disable_default_registry = true
disable_backends = ["asdf", "vfox", "ubi"]

[tools]
"aqua:slsa-verifier" = "2.7.1"

[env]
# Nuget.org username of the individual account that created the trusted-
# publishing policy. NOT the package owner (org or user that owns the
# package). NuGet's token-exchange endpoint requires the creator's name
# even when the package belongs to an organization. Consumed by
# NuGet/login@v1 via the `user` input in release-dotnet.yml. Gitted
# (public) rather than a GitHub repo variable; not a secret.
NUGET_USER = "Pinguladora"

[tasks."ci:git-config"]
run = """
git config --global core.compression 0
git config --global core.fsync -all
"""
description = "Optimize Git config for CI (disable compression, fsync)"

[tasks."ci:restore"]
run = "dotnet restore SdkCoreDotnet.slnx --use-lock-file --locked-mode"
description = "Restore NuGet packages in locked mode (fails on lockfile drift)"
sources = [
  "**/*.csproj",
  "**/packages.lock.json",
  "SdkCoreDotnet.slnx",
  "Directory.Packages.props",
  "eng/Versions.props",
  "global.json",
]
outputs = ["**/obj/project.assets.json"]

[tasks."ci:build"]
run = "dotnet build SdkCoreDotnet.slnx --configuration Release --no-restore"
description = "Build solution in Release without restoring"
sources = [
  "src/**/*.cs",
  "src/**/*.csproj",
  "tests/**/*.cs",
  "tests/**/*.csproj",
  "SdkCoreDotnet.slnx",
  "Directory.Build.props",
  "Directory.Packages.props",
  "eng/Versions.props",
  "global.json",
]
outputs = [
  "src/**/bin/Release/**/*",
  "tests/**/bin/Release/**/*",
]

[tasks."ci:test"]
# .NET 10 SDK shipped a new `dotnet test` mode that natively
# understands Microsoft.Testing.Platform projects when the test
# runner is set in global.json. Running it slnx-wide via
# `--solution` executes every test project; under the legacy VSTest
# mode the per-project executable shape was the workaround that
# only ran one project. TRX and coverage are MTP-native flags now.
run = "dotnet test --solution SdkCoreDotnet.slnx --configuration Release --no-build --report-trx --coverage"
description = "Run every MTP test project in the slnx with TRX + coverage"
depends = ["ci:build"]
sources = [
  "src/**/*.cs",
  "src/**/*.csproj",
  "tests/**/*.cs",
  "tests/**/*.csproj",
  "SdkCoreDotnet.slnx",
  "Directory.Build.props",
  "Directory.Packages.props",
  "eng/Versions.props",
  "global.json",
]
outputs = ["tests/**/TestResults/**/*.trx"]

[tasks."ci:format-check"]
# --no-restore is mandatory: dotnet format opens an MSBuildWorkspace
# that runs its own restore, which fails to evaluate the Aspire
# AppHost SDK. ci:restore already populated obj/project.assets.json
# for every project, so format-check just consumes those.
run = "dotnet format SdkCoreDotnet.slnx --verify-no-changes --no-restore"
description = "Verify formatting in CI"
depends = ["ci:restore"]

[tasks."ci:pack"]
run = "dotnet pack SdkCoreDotnet.slnx --configuration Release --no-build --output out/packages"
description = "Build NuGet packages for release"
sources = [
  "src/**/*.cs",
  "src/**/*.csproj",
  "src/**/PACKAGE.md",
  "SdkCoreDotnet.slnx",
  "Directory.Build.props",
  "Directory.Packages.props",
  "eng/Versions.props",
]
outputs = ["out/packages/*.nupkg", "out/packages/*.snupkg"]
