issuer: https://token.actions.githubusercontent.com
# Two issuance shapes are accepted:
#   - push/scheduled runs on main: subject is repo:Pinguteca/...:ref:refs/heads/main
#   - pull_request runs from internal branches: subject is repo:Pinguteca/...:pull_request
# Branch protection now requires PRs even for trivial changes, so the
# scan must run on every PR. Fork PRs would expose token issuance to
# attacker-controlled workflow code; the workflow itself must gate
# fork runs (or be limited to repository-write contexts) before this
# policy is meaningful as a security boundary.
subject_pattern: "repo:Pinguteca/sdk-core-dotnet:(ref:refs/heads/main|pull_request)"
claim_pattern:
  workflow_ref: "Pinguteca/sdk-core-dotnet/\\.github/workflows/secret-scan\\.yml@refs/(heads/main|pull/[0-9]+/merge)"
permissions:
  contents: read
