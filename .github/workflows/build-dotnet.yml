name: Build (.NET)

on:
  push:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.slnx"
      - "Directory.Build.*"
      - "Directory.Packages.props"
      - "global.json"
      - "**/packages.lock.json"
      - "mise.toml"
      - "mise.ci.toml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.slnx"
      - "Directory.Build.*"
      - "Directory.Packages.props"
      - "global.json"
      - "**/packages.lock.json"
      - "mise.toml"
      - "mise.ci.toml"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  MISE_ENV: ci
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build:
    name: Restore, format-check, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # checkout
      id-token: write # OIDC token for octo-sts exchange
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Obtain token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: build
      - name: Optimize Git config for CI
        run: |
          git config --global core.compression 0
          git config --global core.fsync -all
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          filter: "blob:none"
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Install mise and tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install: true
          cache: false
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - name: Restore (locked)
        run: mise run ci:restore
      - name: Format check
        run: mise run ci:format-check
      - name: Build
        run: mise run ci:build
      - name: Test
        run: mise run ci:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/*.cobertura.xml
            **/TestResults/**/*-report.html
          retention-days: 30
          if-no-files-found: ignore
