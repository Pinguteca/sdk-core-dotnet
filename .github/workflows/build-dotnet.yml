name: Build (.NET)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
# No paths filter: branch protection requires the Build job on every
# PR, and a path-skipped run reports as skipped (not success), which
# blocks the merge. The earlier phantom-skip sibling workflow shared
# `name: Build (.NET)` with this one, which put both in the same
# concurrency group and made one cancel the other mid-flight; the
# resulting two check runs with the same job name produced
# non-deterministic required-check aggregation. Simpler and safer to
# just run the real build on every PR. A docs-only PR pays one
# extra restore+build; cheap relative to bypass-protection churn.

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  MISE_ENV: ci
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build:
    name: Restore, format-check, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # checkout
      id-token: write # OIDC token for octo-sts exchange
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Obtain token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: build
      - name: Optimize Git config for CI
        run: |
          git config --global core.compression 0
          git config --global core.fsync -all
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          filter: "blob:none"
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Install mise and tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
          install: true
          cache: false
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - name: Restore (locked)
        run: mise run ci:restore
      - name: Format check
        run: mise run ci:format-check
      - name: Build
        run: mise run ci:build
      - name: Test
        run: mise run ci:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/*.cobertura.xml
            **/TestResults/**/*-report.html
          retention-days: 30
          if-no-files-found: ignore
