name: Release (.NET)

on:
  push:
    # Per-package tags follow the cog monorepo default: <pkg>-v<semver>,
    # e.g. core-v0.4.0 or hedge-v0.1.0. Keep this list aligned with the
    # keys under [monorepo.packages] in cog.toml and the subject_pattern
    # in .github/chainguard/release.sts.yaml.
    tags:
      - "core-v*"
      - "caching-v*"
      - "compression-v*"
      - "hedge-v*"
      - "logging-v*"
      - "ergo-v*"
      - "oauth-v*"
  workflow_dispatch:

permissions: {}

concurrency:
  # Per-tag concurrency so different packages release in parallel.
  # github.ref_name is the bare tag (e.g. core-v0.4.0, hedge-v0.1.0)
  # so simultaneous tag pushes land in different groups and run
  # concurrently. Re-pushing the same tag queues behind the in-flight
  # run rather than cancelling it; cancel-in-progress: false keeps
  # half-finished NuGet pushes from being interrupted, which would
  # leave a hole between dotnet nuget push and the GitHub Release.
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CI: "true"
  MISE_ENV: ci
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  release:
    name: Pack and publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      id-token: write # OIDC token for octo-sts exchange and NuGet trusted publishing
      contents: write # gh release create writes a GitHub Release object
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo: "true"
      - name: Optimize Git config for CI
        run: |
          git config --global core.compression 0
          git config --global core.fsync -all
      - name: Obtain release token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: release
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Install mise and tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
          install: true
          cache: false
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - name: Parse release tag
        # Slice <pkg>-v<semver> into RELEASE_PKG_NAME / RELEASE_VERSION /
        # RELEASE_PROJECT / RELEASE_PROPERTY for the rest of the job.
        # See the release:parse-tag task in mise.toml; same shape as
        # the Dart pipeline so the surfaces stay aligned.
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: mise run release:parse-tag >> "$GITHUB_ENV"
      - name: Verify Versions.props matches tag
        # cog produces the bump commit, the props edit, and the tag
        # atomically. A mismatch means a manual edit drifted from
        # cog's state. Fail fast before the OIDC token is consumed.
        run: mise run release:verify-version
      - name: Restore
        run: mise run ci:restore
      - name: Build
        run: mise run ci:build
      - name: Pack
        # Scoped to the tagged project only. The other packable
        # projects are left untouched so their last-shipped versions
        # remain authoritative on NuGet. `dotnet pack` runs offline
        # against the local build output, so it doubles as the
        # publish dry run; the network-touching step is the NuGet
        # push at the end of this job.
        run: mise run release:pack
      - name: Generate SBOM
        run: mise run release:sbom
      - name: Compute checksums
        run: |
          cd out
          sha256sum packages/*.nupkg packages/*.snupkg "sbom/${RELEASE_PKG_NAME}.cdx.json" > checksums.txt 2>/dev/null || true
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign checksums
        run: |
          cd out
          cosign sign-blob \
            --bundle=checksums.txt.sigstore.json \
            --yes \
            checksums.txt
      - name: Compute SLSA subject hashes
        id: hash
        run: |
          echo "hashes=$(base64 -w0 out/checksums.txt)" >> "$GITHUB_OUTPUT"
      # NuGet Trusted Publishing: the job's GitHub OIDC token is exchanged
      # for a 1-hour API key at push time. No long-lived secret in the
      # repo. Policy on nuget.org binds this workflow file name to the
      # publisher account; first push under a new package id creates the
      # package owned by that account. NUGET_USER comes from mise.ci.toml.
      # See https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      - name: NuGet login (OIDC to short-lived API key)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ env.NUGET_USER }}
      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push "out/packages/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${NUGET_API_KEY}" \
            --skip-duplicate
      # GitHub releases on this repo are immutable: re-running the
      # workflow on the same tag cannot delete and replace assets,
      # which softprops/action-gh-release tried to do on every run.
      # Atomic gh release create on first run, no-op on retry.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            out/packages/*.nupkg \
            "out/sbom/${RELEASE_PKG_NAME}.cdx.json" \
            out/checksums.txt \
            out/checksums.txt.sigstore.json

  provenance:
    name: SLSA provenance
    needs: release
    permissions:
      actions: read # SLSA generator inspects this run's metadata
      id-token: write # OIDC token signs the provenance subject hashes
      contents: write # SLSA generator can upload to the GitHub Release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      # Keep provenance as a workflow artifact only. Attaching to the
      # GitHub Release races whichever tool owns the release lifecycle
      # (softprops today, possibly GoReleaser/JReleaser later) and SLSA
      # verifiers pull provenance from the workflow run, not the release.
      upload-assets: false
      provenance-name: provenance.intoto.jsonl
      private-repository: false
