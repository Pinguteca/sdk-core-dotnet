name: Release (.NET)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  MISE_ENV: ci
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  release:
    name: Pack and publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      id-token: write
      contents: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo: "true"
      - name: Obtain release token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: release
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Install mise and tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - name: Resolve version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Restore
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: mise run ci:restore
      - name: Build
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: mise run ci:build
      - name: Pack
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: mise run ci:pack
      - name: Generate SBOM
        run: mise run release:sbom
      - name: Compute checksums
        run: |
          cd out
          sha256sum packages/*.nupkg packages/*.snupkg sbom/sdk-core-dotnet.cdx.json > checksums.txt 2>/dev/null || true
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign checksums
        run: |
          cd out
          cosign sign-blob \
            --bundle=checksums.txt.sigstore.json \
            --yes \
            checksums.txt
      - name: Compute SLSA subject hashes
        id: hash
        run: |
          echo "hashes=$(base64 -w0 out/checksums.txt)" >> "$GITHUB_OUTPUT"
      # NuGet Trusted Publishing: the job's GitHub OIDC token is
      # exchanged for a 1-hour API key at push time. No long-lived
      # secret in the repo. Policy on nuget.org binds this workflow
      # file name to the publisher account; first push under a new
      # package id creates the package owned by that account.
      # See https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      - name: NuGet login (OIDC to short-lived API key)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push to NuGet.org
        run: |
          dotnet nuget push "out/packages/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          files: |
            out/packages/*.nupkg
            out/packages/*.snupkg
            out/sbom/sdk-core-dotnet.cdx.json
            out/checksums.txt
            out/checksums.txt.sigstore.json
          generate_release_notes: true
          fail_on_unmatched_files: false

  provenance:
    name: SLSA provenance
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
      provenance-name: provenance.intoto.jsonl
      private-repository: false
