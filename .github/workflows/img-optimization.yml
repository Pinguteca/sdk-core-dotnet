name: Optimize Images

on:
  push:
    branches: [main]
    paths:
      - "**.jpg"
      - "**.jpeg"
      - "**.png"
      - "**.webp"
      - "**.avif"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "**.jpg"
      - "**.jpeg"
      - "**.png"
      - "**.webp"
      - "**.avif"
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  optimize:
    name: Compress images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # OIDC token for octo-sts to fetch a scoped repo token
      contents: write # commit optimized image assets back to a feature branch
      pull-requests: write # open the optimization PR against main
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Obtain token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: img-optimization
      - name: Optimize Git config for CI
        run: |
          git config --global core.compression 0
          git config --global core.fsync -all
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Optimize raster images
        uses: calibreapp/image-actions@9d037c06280028c110ff61c433ad4dc7d33c3c43 # 1.5.0
        with:
          githubToken: ${{ steps.octo-sts.outputs.token }}
          jpegQuality: "85"
          pngQuality: "85"
          webpQuality: "85"
          ignorePaths: "node_modules/**,vendor/**,**/*.git/**"
          compressOnly: false
