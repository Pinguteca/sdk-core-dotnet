name: Lint GitHub Actions

on:
  push:
    branches: [main]
    paths:
      - ".github/zizmor.yml"
      - ".github/workflows/**.yml"
      - ".github/workflows/**.yaml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - ".github/zizmor.yml"
      - ".github/workflows/**.yml"
      - ".github/workflows/**.yaml"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Analyze workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # zizmor and actionlint upload SARIF to GitHub Code Scanning
      id-token: write # OIDC token for octo-sts exchange and NuGet trusted publishing
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo: "true"
      - name: Obtain release token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: lint-gha
      - name: Optimize Git config for CI
        run: |
          git config --global core.compression 0
          git config --global core.fsync -all
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/zizmor.yml
          sparse-checkout-cone-mode: false
          filter: "blob:none"
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          config: .github/zizmor.yml
      - name: Run actionlint via reviewdog
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
