name: Build (.NET)

# Phantom-success sibling of build-dotnet.yml. GitHub matches
# required status checks by job display name across workflow files,
# so the same name "Restore, format-check, build, test" can be
# satisfied by EITHER the real build (when code paths change) OR
# this no-op (when only docs/CI/non-code paths change).
#
# The paths-ignore filter here is the inverse of the paths filter
# on build-dotnet.yml: keep them in lockstep when either list is
# edited. Otherwise both jobs run (waste) or neither does (merge
# blocked on the required check). See the GitHub guide on path-
# filtered required checks for the rationale.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.slnx"
      - "Directory.Build.*"
      - "Directory.Packages.props"
      - "global.json"
      - "**/packages.lock.json"
      - "mise.toml"
      - "mise.ci.toml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.slnx"
      - "Directory.Build.*"
      - "Directory.Packages.props"
      - "global.json"
      - "**/packages.lock.json"
      - "mise.toml"
      - "mise.ci.toml"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Restore, format-check, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: No-op
        run: echo "Non-code change; build skipped, required check satisfied by phantom job."
