name: Optimize SVGs

on:
  push:
    branches: [main]
    paths: ["**.svg"]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths: ["**.svg"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect SVG changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.filter.outputs.svg }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Filter SVGs
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            svg:
              - "**/*.svg"

  optimize:
    name: Run SVGO
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Obtain token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: svg-optimization
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Run SVGO
        run: |
          npm config set -g minimumReleaseAge 30240
          npx --yes svgo@4 --multipass --recursive .
      - name: Install gitsign
        uses: chainguard-dev/actions/setup-gitsign@5a9aa9e1e5d2b6cf78b38b68e7db7c3df9e1c2db # main
      - name: Auto-commit optimized SVGs
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: optimize svgs"
          file_pattern: "**/*.svg"
          commit_user_name: "Pinguteca Bot"
          commit_user_email: "bot@pinguteca.com"
