name: Verify GHA Integrity

on:
  push:
    branches: [main]
    paths: [".github/workflows/**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths: [".github/workflows/**"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify pinned action SHAs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Obtain token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: verify-gha-integrity
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Verify lockfile
        uses: gjtorikian/gh-actions-lockfile@b3eb45c7be8745fc24a149f7bc6e21f3f5f2cb8c # v1.5.0
        with:
          mode: verify
      - name: Regenerate lockfile on failure
        if: failure()
        uses: gjtorikian/gh-actions-lockfile@b3eb45c7be8745fc24a149f7bc6e21f3f5f2cb8c # v1.5.0
        with:
          mode: generate
      - name: Auto-commit regenerated lockfile
        if: failure()
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "ci: regenerate .github/actions.lock.json [skip ci]"
          file_pattern: .github/actions.lock.json
