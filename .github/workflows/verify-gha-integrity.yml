name: Verify GHA Integrity

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/actions.lock.json"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/actions.lock.json"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify pinned action SHAs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Verify lockfile
        # Verify-only: the upstream action re-fetches each pinned
        # tarball and compares its hash against the stored integrity
        # value. No regenerate, no auto-commit. Drift is fixed by
        # the contributor locally; the prek pre-commit hook
        # regenerates the lockfile whenever a workflow YAML changes,
        # so the file lands fresh in the same commit and this step
        # passes. On verify failure: run `mise run actions:lockfile`
        # locally, inspect the diff, commit, push.
        uses: gjtorikian/gh-actions-lockfile@8abbeb1fe0a4bf20279c81fa206e6a2fc862a830 # v1.2.1
        with:
          mode: verify
