name: Scheduled Release

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version from conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # OIDC token for octo-sts to dispatch the release workflow
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Optimize Git config for CI
        run: |
          git config --global core.compression 0
          git config --global core.fsync -all
      - name: Obtain token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: scheduled-release
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: "blob:none"
          persist-credentials: false
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Configure git remote
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Pinguteca/sdk-core-dotnet.git"
      - name: Install mise and tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install: true
          cache: false
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - name: Run bump
        run: cog bump --auto
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
