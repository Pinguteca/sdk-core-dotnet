name: Scheduled Release

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version from conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # OIDC token for octo-sts to dispatch the release workflow
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
      - name: Optimize Git config for CI
        run: |
          git config --global core.compression 0
          git config --global core.fsync -all
      - name: Obtain token
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: Pinguteca/sdk-core-dotnet
          identity: scheduled-release
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          filter: "blob:none"
          # Persist the octo-sts token (not GITHUB_TOKEN) so cog bump
          # can push the version commit and tag back to main. Token
          # is scoped via the chainguard trust policy and expires
          # within the hour.
          persist-credentials: true
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Install mise and tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
          install: true
          cache: false
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - name: Run bump
        run: cog bump --auto
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
